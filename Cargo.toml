[package]
name = "tee-worker-pre-compute"
version = "0.1.0"
edition = "2024"

[dependencies]
ethereum-types = "0.14.1"
serde = { version = "1.0", features = ["derive"] }
sha256 = "1.6.0"
sha3 = "0.10.8"
hex = "0.4.3"
secp256k1 = { version = "0.29.1", features = ["recovery"], feature = ["rand"] }
log = { version = "0.4" }
tiny-keccak = "2.0.2"
ethers = { version = "2.0", features = ["legacy"] }
temp-env = "0.3"